<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Rekomendasi Produk</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 40px 16px; }
      .card { background: white; border-radius: 12px; padding: 32px; width: 100%; max-width: 500px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
      h1 { font-size: 1.4rem; margin-bottom: 8px; color: #1a1a2e; }
      p.sub { color: #666; font-size: 0.9rem; margin-bottom: 24px; }
      .input-row { display: flex; gap: 8px; }
      input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; outline: none; }
      input:focus { border-color: #4f46e5; }
      button { padding: 10px 18px; background: #4f46e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; }
      button:hover { background: #4338ca; }
      .suggestions { margin-top: 6px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; display: none; }
      .suggestions li { padding: 8px 14px; cursor: pointer; font-size: 0.9rem; list-style: none; }
      .suggestions li:hover { background: #f5f5ff; }
      .section { margin-top: 24px; }
      .section h3 { font-size: 0.95rem; color: #555; margin-bottom: 10px; }
      .result-list { list-style: none; }
      .result-list li { padding: 10px 14px; background: #f5f5ff; border-radius: 8px; margin-bottom: 6px; font-size: 0.95rem; color: #1a1a2e; }
      .empty { color: #aaa; font-size: 0.9rem; }
      .time { font-size: 0.8rem; color: #aaa; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>🛍️ Sistem Rekomendasi Produk</h1>
      <p class="sub">Ketik nama produk untuk mendapatkan rekomendasi</p>

      <div class="input-row">
        <input type="text" id="product" placeholder="Contoh: Smart, Gaming, Korean..." autocomplete="off" />
        <button onclick="getRecommendation()">Cari</button>
      </div>
      <ul class="suggestions" id="suggestions"></ul>

      <div class="section">
        <h3>Rekomendasi:</h3>
        <ul class="result-list" id="result">
          <li class="empty">Belum ada rekomendasi</li>
        </ul>
        <p class="time" id="time"></p>
      </div>
    </div>

    <script>
      const input = document.getElementById("product");
      const suggestionBox = document.getElementById("suggestions");

      async function getRecommendation() {
        const keyword = input.value.trim();
        if (!keyword) return;

        const t0 = performance.now();
        const res = await fetch(`/recommend/${encodeURIComponent(keyword)}`);
        const data = await res.json();
        const t1 = performance.now();

        const list = document.getElementById("result");
        list.innerHTML = "";
        suggestionBox.style.display = "none";

        if (!data.recommendations || data.recommendations.length === 0) {
          list.innerHTML = '<li class="empty">Produk tidak ditemukan</li>';
        } else {
          data.recommendations.forEach((item) => {
            const li = document.createElement("li");
            li.textContent = item;
            list.appendChild(li);
          });
        }

        document.getElementById("time").textContent = `Response time: ${(t1 - t0).toFixed(0)}ms`;
      }

      input.addEventListener("input", async function () {
        const keyword = this.value.trim();
        if (!keyword) { suggestionBox.style.display = "none"; return; }

        const res = await fetch(`/search/${encodeURIComponent(keyword)}`);
        const data = await res.json();

        suggestionBox.innerHTML = "";
        if (data.length === 0) { suggestionBox.style.display = "none"; return; }

        data.forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          li.onclick = () => { input.value = item; suggestionBox.style.display = "none"; getRecommendation(); };
          suggestionBox.appendChild(li);
        });
        suggestionBox.style.display = "block";
      });

      input.addEventListener("keydown", (e) => { if (e.key === "Enter") getRecommendation(); });
    </script>
  </body>
</html>
